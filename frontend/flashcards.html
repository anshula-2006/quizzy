<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashcards | Quizzy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./app.css" />
  <style>
    .fc-board { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; padding: 2rem; }
    .fc-container { perspective: 1200px; width: 100%; max-width: 800px; height: 450px; margin: 0 auto; cursor: pointer; }
    .fc-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); transform-style: preserve-3d; }
    /* The Hover Flip Trigger */
    .fc-container:hover .fc-inner { transform: rotateY(180deg); }
    .fc-front, .fc-back { position: absolute; inset: 0; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 3rem; border-radius: 32px; text-align: center; font-size: 2.2rem; border: 2px solid rgba(255,255,255,0.1); box-shadow: 0 24px 48px rgba(0,0,0,0.4); line-height: 1.4; }
    .fc-front { background: linear-gradient(135deg, rgba(30,41,59,0.95), rgba(15,23,42,0.98)); color: #fff; }
    .fc-back { background: linear-gradient(135deg, rgba(139,92,246,0.9), rgba(6,182,212,0.9)); color: #fff; transform: rotateY(180deg); }
    .fc-badge { position: absolute; top: 1.5rem; left: 1.5rem; font-size: 0.85rem; text-transform: uppercase; font-weight: 800; letter-spacing: 0.2em; color: rgba(255,255,255,0.6); }
    .fc-hint { margin-top: 1.5rem; font-size: 1.1rem; color: rgba(255,255,255,0.8); font-weight: 500; }
    .fc-controls { display: flex; gap: 1rem; margin-top: 3rem; width: 100%; max-width: 800px; justify-content: space-between; align-items: center; }
    .fc-status { font-size: 1.1rem; font-weight: 600; color: rgba(255,255,255,0.6); }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="page-container">
      
      <!-- Common Navbar -->
      <header class="panel top-nav">
        <a class="brand" href="./index.html"><span class="brand-badge">Q</span><span>Quizzy</span></a>
        <nav class="nav-links">
          <a class="nav-link" href="./index.html">Home</a>
          <a class="nav-link" href="./generate.html">Generate</a>
          <a class="nav-link is-active" href="./flashcards.html">Flashcards</a>
          <a class="nav-link" href="./dashboard.html">Dashboard</a>
          <a class="nav-link" href="./arcade.html">Arcade</a>
          <a class="nav-link" href="./scoreboard.html">Leaderboard</a>
        </nav>
      </header>

      <!-- Dynamic Flashcard Container -->
      <main id="flashcardsRoot" class="panel flow-card page-fade">
        <!-- Content injected by js/flashcards.js -->
      </main>
      
    </div>
  </div>

  <script type="module" src="./js/page-auth.js"></script>
  <script type="module" src="./flashcards.js"></script>
</body>
</html>
