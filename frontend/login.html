<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quizzy Login</title>
  <link rel="stylesheet" href="auth.css" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="auth-card">
    <h1>Welcome Back</h1>
    <p>Log in to continue using Quizzy.</p>

    <form id="loginForm">
      <div class="auth-field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required />
      </div>
      <div class="auth-field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
      </div>
      <button class="auth-btn" type="submit">Log In</button>
      <p id="message" class="auth-msg"></p>
    </form>

    <p class="auth-footer">
      New user?
      <a href="./register.html">Create an account</a>
    </p>
  </main>

  <script type="module" src="login.js"></script>
</body>
</html>
