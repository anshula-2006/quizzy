<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quizzy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./app.css" />
</head>
<body>
  <div class="page-shell center-page">
    <main class="page-container">
      <section class="panel hero-card hero-home page-fade">
        <div class="hero-copy-block">
          <p class="eyebrow">Quizzy</p>
          <h1 class="page-title">Quizzy &#129504;&#9889;</h1>
          <p class="page-subtitle">Test your brain in seconds with a faster, cleaner study flow that gets you from idea to quiz without the clutter.</p>
          <div class="button-row landing-actions">
            <a class="btn" href="./generate.html">Quiz</a>
            <a class="btn" href="./generate.html">Flashcards</a>
            <a class="btn-outline" href="./arcade.html">Mini Arcade</a>
            <a class="btn-outline" href="./dashboard.html">Dashboard</a>
          </div>
        </div>
        <div class="hero-orbit" aria-hidden="true">
          <div class="hero-orbit-ring"></div>
          <div class="hero-orbit-core">5 sec start</div>
          <div class="hero-floating-card hero-floating-top">
            <strong>Topic</strong>
            <span>Paste notes or a concept</span>
          </div>
          <div class="hero-floating-card hero-floating-right">
            <strong>Arcade</strong>
            <span>Train memory and focus</span>
          </div>
          <div class="hero-floating-card hero-floating-bottom">
            <strong>Result</strong>
            <span>Score and retry instantly</span>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script type="module" src="./js/page-auth.js"></script>
</body>
</html>
