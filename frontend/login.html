<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quizzy Login</title>
  <link rel="stylesheet" href="auth.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="auth-shell">
    <section class="auth-hero">
      <a class="auth-brand" href="./index.html">
        <span class="auth-brand-icon" aria-hidden="true">Q</span>
        <span>Quizzy</span>
      </a>
      <span class="auth-pill">Quizzy</span>
      <h1>Welcome back</h1>
      <p>Sign in to continue your quizzes, progress, and history.</p>

      <div class="auth-hero-grid">
        <article class="auth-feature-card">
          <strong>Generate quizzes</strong>
          <span>Topic, PDF, or public URL</span>
        </article>
        <article class="auth-feature-card">
          <strong>Track progress</strong>
          <span>Points, streaks, badges, and history</span>
        </article>
      </div>
    </section>

    <main class="auth-card">
      <div class="auth-card-head">
        <p class="auth-eyebrow">Login</p>
        <h2>Sign in to Quizzy</h2>
        <p>Access your dashboard, history, and leaderboard profile.</p>
      </div>

      <form id="loginForm" class="auth-form">
        <div class="auth-field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" placeholder="you@example.com" required />
        </div>
        <div class="auth-field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Enter your password" required />
        </div>
        <button id="loginSubmitBtn" class="auth-btn" type="submit">Log In</button>
        <p id="message" class="auth-msg"></p>
      </form>

      <p class="auth-footer">
        New user?
        <a href="./register.html">Create an account</a>
      </p>
    </main>
  </div>

  <script type="module" src="./js/page-auth.js"></script>
  <script type="module" src="login.js"></script>
</body>
</html>
