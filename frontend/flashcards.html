<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashcards | Quizzy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./app.css" />
  <style>
    .fc-board { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 50vh; padding: 1rem; }
    .fc-container { perspective: 1200px; width: 100%; max-width: 760px; height: 360px; margin: 0 auto; cursor: pointer; }
    .fc-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); transform-style: preserve-3d; }
    /* The Hover Flip Trigger */
    .fc-container:hover .fc-inner,
    .fc-container:focus .fc-inner,
    .fc-container:focus-within .fc-inner { transform: rotateY(180deg); }
    .fc-front, .fc-back { position: absolute; inset: 0; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 2rem; border-radius: 18px; text-align: center; font-size: clamp(1.25rem, 2.2vw, 1.8rem); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 18px 36px rgba(0,0,0,0.28); line-height: 1.35; }
    .fc-badge { position: absolute; top: 1.5rem; left: 1.5rem; font-size: 0.85rem; text-transform: uppercase; font-weight: 800; letter-spacing: 0.2em; color: rgba(255,255,255,0.6); }
    .fc-hint { margin-top: 1.5rem; font-size: 1.1rem; color: rgba(255,255,255,0.8); font-weight: 500; }
    .fc-controls { display: flex; gap: 1rem; margin-top: 1.5rem; width: 100%; max-width: 760px; justify-content: space-between; align-items: center; }
    .fc-status { font-size: 1.1rem; font-weight: 600; color: rgba(255,255,255,0.6); }
  </style>
  <style>
    /* AMOLED + Neon Cyber Theme */
    :root, body.dark, body {
      --bg: #050816 !important;
      --panel-soft: #111827 !important; /* card bg */
      --primary: #8B5CF6 !important;
      --secondary: #06B6D4 !important;
      --accent: #EC4899 !important;
      --text: #F9FAFB !important;
      --muted: #9CA3AF !important;
      --line: rgba(139, 92, 246, 0.15) !important;
      --glass-border: rgba(255, 255, 255, 0.05);
      --glow-shadow: 0 0 20px rgba(139, 92, 246, 0.15), 0 0 40px rgba(6, 182, 212, 0.1);
    }

    body {
      background-color: var(--bg) !important;
      color: var(--text) !important;
      background-image: 
        radial-gradient(circle at 15% 0%, rgba(139, 92, 246, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 85% 100%, rgba(6, 182, 212, 0.08) 0%, transparent 40%);
      background-attachment: fixed;
    }

    /* Layout & Spacing Improvements */
    .page-container {
      max-width: 1440px;
      margin: 0 auto;
      padding: 2rem;
    }
    @media (max-width: 768px) {
      .page-container { padding: 1rem; }
    }

    main, .arcade-shell, .auth-shell {
      animation: neonFadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Glassmorphism Card Styling */
    .panel, .card, .glass-card, [class*="card"], .auth-card {
      background: rgba(17, 24, 39, 0.65) !important;
      backdrop-filter: blur(24px) !important;
      -webkit-backdrop-filter: blur(24px) !important;
      border: 1px solid var(--glass-border) !important;
      border-radius: 20px !important;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5) !important;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.4s ease, border-color 0.4s ease !important;
      position: relative;
      overflow: hidden;
    }

    /* Subtle Hover Animations */
    .panel:hover, .card:hover, .glass-card:hover, [class*="card"]:hover, .auth-card:hover {
      transform: translateY(-4px);
      border-color: rgba(139, 92, 246, 0.3) !important;
      box-shadow: var(--glow-shadow) !important;
      z-index: 10;
    }

    /* Typography Hierarchy */
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Poppins', sans-serif !important;
      font-weight: 700 !important;
      letter-spacing: -0.02em;
      color: #ffffff !important;
    }

    p { color: var(--muted) !important; line-height: 1.6; }

    .neon-text, .section-title, .saas-stat-value, .auth-brand span:not(.auth-brand-icon) {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 25px rgba(139, 92, 246, 0.3);
    }

    /* Remove Visually Empty Sections */
    *:empty:not(input):not(img):not(hr):not(br):not(i):not(.mini-progress span):not(.auth-brand-icon):not(.password-strength span) {
      display: none !important;
    }

    @keyframes neonFadeIn {
      from { opacity: 0; transform: translateY(15px); filter: brightness(0.8); }
      to { opacity: 1; transform: translateY(0); filter: brightness(1); }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="page-container">
      
      <!-- Common Navbar -->
      <header class="panel top-nav" style="margin-bottom: 2rem;">
        <a class="brand" href="./index.html"><span class="brand-badge">Q</span><span>Quizzy</span></a>
        <nav class="nav-links">
          <a class="nav-link" href="./index.html">Home</a>
          <a class="nav-link" href="./generate.html">Generate</a>
          <a class="nav-link is-active" href="./flashcards.html">Flashcards</a>
          <a class="nav-link" href="./dashboard.html">Dashboard</a>
          <a class="nav-link" href="./arcade.html">Arcade</a>
          <a class="nav-link" href="./scoreboard.html">Leaderboard</a>
        </nav>
      </header>

      <!-- Dynamic Flashcard Container -->
      <main id="flashcardsRoot" class="panel flow-card page-fade">
        <!-- Content injected by js/flashcards.js -->
      </main>
      
    </div>
  </div>

  <script type="module" src="./js/page-auth.js"></script>
  <script type="module" src="./flashcards.js"></script>
</body>
</html>
