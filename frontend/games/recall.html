<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Number Recall | Mini Arcade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../arcade.css" />
</head>
<body class="arcade-body">
  <div class="arcade-shell">
    <div class="arcade-frame">
      <header class="arcade-header">
        <div>
          <div class="arcade-mark">Mini Arcade</div>
          <h1 class="arcade-title">Number Recall</h1>
          <p class="arcade-subtitle">Memorize the sequence, then type it back from memory.</p>
        </div>
        <a class="arcade-back" href="../arcade.html">Back to Arcade</a>
      </header>

      <main class="arcade-panel arcade-game-wrap">
        <section class="arcade-game-head">
          <div class="arcade-kpis">
            <div class="arcade-kpi"><span>Level</span><strong id="levelValue">3</strong></div>
          </div>
          <div class="arcade-actions">
            <button id="startRecallBtn" class="arcade-btn" type="button">Start Round</button>
          </div>
        </section>

        <div class="recall-stage">
          <div id="sequenceDisplay" class="recall-hidden">Press start to begin</div>
        </div>

        <form id="recallForm" class="recall-form" autocomplete="off">
          <input id="recallInput" class="recall-input" type="text" inputmode="numeric" placeholder="Enter the sequence" />
          <div class="arcade-actions">
            <button class="arcade-btn-secondary" type="submit">Submit</button>
          </div>
          <p id="recallFeedback" class="arcade-feedback"></p>
        </form>
      </main>
    </div>
  </div>

  <script type="module" src="../js/page-auth.js"></script>
  <script type="module" src="../js/games/recall.js"></script>
</body>
</html>
