<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quizzy Leaderboard</title>
  <link rel="stylesheet" href="./app.css" />
  <style>
    :root {
      --primary: var(--purple);
      --secondary: var(--cyan);
      --accent: var(--blue);
      --glass-border: var(--line);
      --glow-shadow: var(--shadow-soft);
    }

    .page-container {
      max-width: 1440px;
      margin: 0 auto;
      padding: 2rem;
    }

    @media (max-width: 768px) {
      .page-container { padding: 1rem; }
    }

    .neon-text, .section-title, .saas-stat-value, .auth-brand span:not(.auth-brand-icon) {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .theme-toggle {
      gap: 8px;
      white-space: nowrap;
    }

    .theme-icon {
      font-size: 1rem;
      line-height: 1;
    }

    .scoreboard-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
    }

    .scoreboard-content-grid {
      grid-template-columns: 1fr !important;
    }

    .scoreboard-support-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 0.55fr);
      gap: 24px;
      align-items: start;
    }

    @media (max-width: 900px) {
      .scoreboard-support-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="page-container">
      <header class="panel top-nav" style="margin-bottom: 2rem;">
        <a class="brand" href="./index.html"><span class="brand-badge">Q</span><span>Quizzy</span></a>
        <nav class="nav-links">
          <a class="nav-link" href="./index.html">Home</a>
          <a class="nav-link" href="./generate.html">Generate</a>
          <a class="nav-link" href="./flashcards.html">Flashcards</a>
          <a class="nav-link" href="./dashboard.html">Dashboard</a>
          <a class="nav-link" href="./arcade.html">Arcade</a>
          <a class="nav-link is-active" href="./scoreboard.html">Leaderboard</a>
        </nav>
        <div class="nav-actions" style="display:flex; gap:1rem; align-items:center;">
          <span id="authUser" class="hidden"></span>
          <a id="loginLink" class="nav-link" href="./login.html">Login</a>
          <a id="registerLink" class="nav-link" href="./register.html">Register</a>
          <button id="themeToggle" class="theme-toggle" type="button" aria-label="Switch to light theme">
            <span class="theme-icon" aria-hidden="true">☀</span>
            <span class="theme-label">Light</span>
          </button>
          <button id="logoutBtn" class="btn-outline hidden" type="button">Logout</button>
        </div>
      </header>

      <main class="scoreboard-shell shell-scoreboard page-fade">
        <section class="panel flow-card scoreboard-head">
          <div>
            <p class="eyebrow">Quizzy</p>
            <h2>Leaderboard</h2>
            <p>Clean rankings, your score snapshot, and recent attempts.</p>
          </div>
        </section>

        <section id="scoreboardContent" class="scoreboard-content"></section>
      </main>
    </div>
  </div>

  <script type="module" src="scoreboard.js"></script>
</body>
</html>
