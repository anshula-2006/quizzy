<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reaction Tap | Mini Arcade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../arcade.css" />
</head>
<body class="arcade-body">
  <div class="arcade-shell">
    <div class="arcade-frame">
      <header class="arcade-header">
        <div>
          <div class="arcade-mark">Mini Arcade</div>
          <h1 class="arcade-title">Reaction Tap</h1>
          <p class="arcade-subtitle">Wait for the signal, then respond with one clean tap.</p>
        </div>
        <a class="arcade-back" href="../arcade.html">Back to Arcade</a>
      </header>

      <main class="arcade-panel arcade-game-wrap">
        <section class="arcade-game-head">
          <div class="arcade-kpis">
            <div class="arcade-kpi"><span>Best</span><strong id="bestReaction">--</strong></div>
          </div>
          <div class="arcade-actions">
            <button id="startReactionBtn" class="arcade-btn" type="button">Start Round</button>
          </div>
        </section>

        <button id="reactionStage" class="reaction-stage" type="button">
          <div id="reactionStatus" class="reaction-stage-inner">
            <div class="reaction-label">Wait...</div>
            <p class="reaction-caption">Press start to begin a round.</p>
          </div>
        </button>
      </main>
    </div>
  </div>

  <script type="module" src="../js/games/reaction.js"></script>
</body>
</html>
